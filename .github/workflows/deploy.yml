name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: npm install -g vercel@latest

      - name: Get Vercel project info and deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          echo "=== Projetos na conta Vercel ==="
          curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects?limit=20" | \
            python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for p in d.get('projects',[]):
              print(p['id'], p['name'], [a.get('value','') for a in p.get('alias',[])][:2])
          " || echo "API call failed"
          
          echo "=== Fazendo deploy ==="
          vercel deploy . \
            --prod \
            --yes \
            --token $VERCEL_TOKEN \
            2>&1 | tee /tmp/deploy_out.txt
          
          echo "=== URL do deploy ==="
          cat /tmp/deploy_out.txt
          grep -oE 'https://[a-zA-Z0-9._-]+\.vercel\.app' /tmp/deploy_out.txt | head -5
