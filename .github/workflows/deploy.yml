name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - run: npm run build

      - run: npm install -g vercel@latest

      - name: Deploy to Vercel (prod, force project name)
        run: |
          vercel deploy dist/ \
            --prod \
            --yes \
            --name sefaz-ce-2026 \
            --token ${{ secrets.VERCEL_TOKEN }} \
            2>&1 | tee /tmp/vercel_output.txt
          cat /tmp/vercel_output.txt
          grep -oP 'https://[^\s]+vercel\.app' /tmp/vercel_output.txt | head -3 || true
