name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: npm install -g vercel@latest

      - name: Deploy root to Vercel (usa index.html standalone + vercel.json)
        run: |
          vercel deploy . \
            --prod \
            --yes \
            --name sefaz-ce-2026 \
            --token ${{ secrets.VERCEL_TOKEN }}
